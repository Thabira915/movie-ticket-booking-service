services:
  # MySQL Service
  mysql-db:
    image: mysql:8.0
    container_name: movie_mysql_container
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: movie_booking_db
      MYSQL_ROOT_PASSWORD: root
    networks:
      - movie-network
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  # MongoDB Service
  mongodb:
    image: mongo:latest
    container_name: mongodb_container
    ports:
      - "27018:27017"
    networks:
      - movie-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Your Spring Boot App
  movie-service:
    build: .
    container_name: movie_app_container
    ports:
      - "9090:8080"
    depends_on:
      mysql-db:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      - SPRING_MONGODB_URI=mongodb://mongodb:27017/movie_catalog_db
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/movie_booking_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    networks:
      - movie-network

networks:
  movie-network:
    driver: bridge
