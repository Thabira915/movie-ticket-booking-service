spring:
  application:
    name: movie-ticket-service

  # REMOVED the extra "spring:" line that was here
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql-db:3306/movie_booking_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}

  mongodb:
    # Using 'mongodb' as the hostname (matches docker-compose service name)
    uri: ${SPRING_MONGODB_URI:mongodb://mongodb:27017/movie_catalog_db}

  data:
    mongodb:
      # Keep the Spring Data namespace aligned with the runtime connection details.
      uri: ${SPRING_MONGODB_URI:mongodb://mongodb:27017/movie_catalog_db}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"
  endpoint:
    health:
      show-details: always
