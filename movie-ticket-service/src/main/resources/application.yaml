spring:
  application:
    name: movie-ticket-service

  # MySQL Configuration
  datasource:
    # Use service name 'mysql-db' instead of localhost for Docker
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql-db:3306/movie_booking_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  # MongoDB Configuration
  data:
    mongodb:
      # Use service name 'mongodb' instead of localhost for Docker
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://mongodb:27017/movie_catalog_db}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        #dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

# Management and Swagger (Keep as you had them)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.tm.platform: DEBUG
    org.hibernate.SQL: DEBUG